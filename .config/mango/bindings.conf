# Keybindings
# Format: bind=MODIFIERS,KEY,COMMAND,PARAMS
# Modifiers: SUPER, Ctrl, Alt, Shift, NONE (combine with +)

### Core ###

# Open terminal
bind=SUPER,Return,spawn,alacritty msg create-window
# Close window
bind=SUPER+Shift,q,killclient,
# Toggle fullscreen
bind=SUPER,f,togglefullscreen,
# Toggle floating
bind=SUPER,space,togglefloating

### Focus ###

# Focus left
bind=SUPER,Left,focusdir,left
# Focus right
bind=SUPER,Right,focusdir,right
# Focus up
bind=SUPER,Up,focusdir,up
# Focus down
bind=SUPER,Down,focusdir,down

### Workspaces ###

# Workspace 1
bind=SUPER,1,view,1,0
# Workspace 2
bind=SUPER,2,view,2,0
# Workspace 3
bind=SUPER,3,view,3,0
# Workspace 4
bind=SUPER,4,view,4,0
# Workspace 5
bind=SUPER,5,view,5,0
# Workspace 6
bind=SUPER,6,view,6,0
# Workspace 7
bind=SUPER,7,view,7,0
# Workspace 8
bind=SUPER,8,view,8,0
# Workspace 9
bind=SUPER,9,view,9,0
# Workspace 10
bind=SUPER,0,view,10,0

### Move to Workspace ###

# Move to workspace 1
bind=SUPER+Shift,1,toggletag,1,0
# Move to workspace 2
bind=SUPER+Shift,2,toggletag,2,0
# Move to workspace 3
bind=SUPER+Shift,3,toggletag,3,0
# Move to workspace 4
bind=SUPER+Shift,4,toggletag,4,0
# Move to workspace 5
bind=SUPER+Shift,5,toggletag,5,0
# Move to workspace 6
bind=SUPER+Shift,6,toggletag,6,0
# Move to workspace 7
bind=SUPER+Shift,7,toggletag,7,0
# Move to workspace 8
bind=SUPER+Shift,8,toggletag,8,0
# Move to workspace 9
bind=SUPER+Shift,9,toggletag,9,0
# Move to workspace 10
bind=SUPER+Shift,0,toggletag,10,0

### Combine Tags ###

# Toggle view tag 1
bind=SUPER+Ctrl,1,toggleview,1,0
# Toggle view tag 2
bind=SUPER+Ctrl,2,toggleview,2,0
# Toggle view tag 3
bind=SUPER+Ctrl,3,toggleview,3,0
# Toggle view tag 4
bind=SUPER+Ctrl,4,toggleview,4,0
# Toggle view tag 5
bind=SUPER+Ctrl,5,toggleview,5,0
# Toggle view tag 6
bind=SUPER+Ctrl,6,toggleview,6,0
# Toggle view tag 7
bind=SUPER+Ctrl,7,toggleview,7,0
# Toggle view tag 8
bind=SUPER+Ctrl,8,toggleview,8,0
# Toggle view tag 9
bind=SUPER+Ctrl,9,toggleview,9,0
# Toggle view tag 10
bind=SUPER+Ctrl,0,toggleview,10,0

### Layout ###

# Swap with master
bind=SUPER,s,zoom,
# Cycle layouts
bind=SUPER,r,switch_layout,
# Increase master size
bind=SUPER+Shift,equal,setmfact,+0.05
# Decrease master size
bind=SUPER+Shift,minus,setmfact,-0.05
# Add master
bind=SUPER,m,incnmaster,+1
# Remove master
bind=SUPER+Shift,m,incnmaster,-1
# Focus previous in stack
bind=SUPER+Shift,Up,focusstack,prev
# Focus next in stack
bind=SUPER+Shift,Down,focusstack,next
# Swap window left
bind=SUPER+Shift,Left,exchange_client,left
# Swap window right
bind=SUPER+Shift,Right,exchange_client,right
# Reload config
bind=SUPER+Shift,r,reload_config,

### Launcher ###

# App launcher
bind=SUPER,d,spawn,noctalia msg panel-toggle launcher
# Emoji picker
bind=SUPER,period,spawn,noctalia msg panel-toggle launcher /emo
# Run command (no equivalent in noctalia v5)
# bind=SUPER+Shift,d,spawn,

### Session ###

# Session menu
bind=SUPER,Escape,spawn,noctalia msg panel-toggle session
# Session menu
bind=SUPER+Shift,e,spawn,noctalia msg panel-toggle session
# Lock screen
bind=SUPER,l,spawn,noctalia msg session lock
# Lock & suspend
bind=SUPER+Shift,s,spawn,noctalia msg session lock-and-suspend

### Passwords ###

# Copy password
bind=SUPER,p,spawn,app2unit -u rbw-menu.scope -- bash -c "rbw-menu password | wl-copy -n"
# Copy username
bind=SUPER,u,spawn,app2unit -u rbw-menu.scope -- bash -c "rbw-menu username | wl-copy -n"

### Notifications ###

# Notification history
bind=SUPER,n,spawn,noctalia msg panel-toggle control-center notifications
# Toggle Do Not Disturb
bind=SUPER+Shift,n,spawn,noctalia msg notification-dnd-toggle

### Utilities ###

# Clipboard
bind=SUPER,v,spawn,noctalia msg panel-toggle clipboard
# Color picker
bind=SUPER,c,spawn,app2unit -u hyprpicker.scope -- bash -c "hyprpicker | wl-copy -n"
# Calendar
bind=SUPER,t,spawn,noctalia msg panel-toggle control-center calendar
# System monitor
bind=SUPER,grave,spawn,noctalia msg panel-toggle control-center system

### Appearance ###

# Wallpaper picker
bind=SUPER,w,spawn,noctalia msg panel-toggle wallpaper
# Toggle night light
bind=SUPER+Shift,l,spawn,noctalia msg nightlight-toggle

### Shell ###

# Control center
bind=SUPER,a,spawn,noctalia msg panel-toggle control-center
# Settings
bind=SUPER,comma,spawn,noctalia msg settings-toggle
# Toggle bar
bind=SUPER,b,spawn,noctalia msg bar-toggle

### Media ###

# Volume up
bind=NONE,XF86AudioRaiseVolume,spawn,noctalia msg volume-up
# Volume down
bind=NONE,XF86AudioLowerVolume,spawn,noctalia msg volume-down
# Mute speakers
bind=NONE,XF86AudioMute,spawn,noctalia msg volume-mute
# Mute microphone
bind=NONE,XF86AudioMicMute,spawn,noctalia msg mic-mute
# Brightness up
bind=NONE,XF86MonBrightnessUp,spawn,noctalia msg brightness-up
# Brightness down
bind=NONE,XF86MonBrightnessDown,spawn,noctalia msg brightness-down
# Next track
bind=NONE,XF86AudioNext,spawn,noctalia msg media next
# Play/Pause
bind=NONE,XF86AudioPause,spawn,noctalia msg media toggle
# Play/Pause
bind=NONE,XF86AudioPlay,spawn,noctalia msg media toggle
# Previous track
bind=NONE,XF86AudioPrev,spawn,noctalia msg media previous

### Monitors ###

# Focus monitor left
bind=SUPER+Alt,Left,focusmon,left
# Focus monitor right
bind=SUPER+Alt,Right,focusmon,right
# Focus monitor up
bind=SUPER+Alt,Up,focusmon,up
# Focus monitor down
bind=SUPER+Alt,Down,focusmon,down
# Send to monitor left
bind=SUPER+Alt+Shift,Left,tagmon,left
# Send to monitor right
bind=SUPER+Alt+Shift,Right,tagmon,right
# Send to monitor up
bind=SUPER+Alt+Shift,Up,tagmon,up
# Send to monitor down
bind=SUPER+Alt+Shift,Down,tagmon,down

### Quick Nav ###

# Focus last window
bind=SUPER,Tab,focuslast,
# Toggle overview
bind=SUPER,o,toggleoverview,
# Toggle scratchpad
bind=SUPER,minus,toggle_scratchpad,
# Toggle global
bind=SUPER+Shift,g,toggleglobal,

### Mouse ###

# Move window
mousebind=SUPER,btn_left,moveresize,curmove
# Resize window
mousebind=SUPER,btn_right,moveresize,curresize
