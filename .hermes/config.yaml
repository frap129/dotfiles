    name: NeuralWatt
    base_url: https://api.neuralwatt.com/v1
    key_env: NEURALWATT_API_KEY
    api_mode: chat_completions
fallback_providers: []
disabled_toolsets:
  - web
credential_pool_strategies: {}
toolsets:
  - hermes-cli
agent:
